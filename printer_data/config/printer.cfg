[z_tilt]
##  Use Z_TILT_ADJUST to level the bed.
##  z_positions: Location of toolhead
# Uncomment below for 300mm build
z_positions:
  #-50, 18
  50, 18
  150, 348
  350, 18
points:
  50, 50
  150, 250
  250, 50
speed: 350                 # Speed of Z tilt adjustment
horizontal_move_z: 5       # Z axis move speed for adjustments
retries: 20                # Number of retries for adjustment points
retry_tolerance: 0.0025    # Retry tolerance for adjustment accuracy

