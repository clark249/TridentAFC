[mcu cartographer] # See https://www.klipper3d.org/Config_Reference.html#mc
canbus_uuid: a51b22d56a0b

[cartographer]
mcu: cartographer
#   Offsets are measured from the centre of your coil, to the tip of your nozzle 
#   on a level axis. It is vital that this is accurate. 
x_offset: 0                          
#    adjust for your cartographers offset from nozzle to middle of coil
y_offset: 23      

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

#[adxl345]
#Cartographer V4 has int2 connected to the probes PA1 pin
#cs_pin: cartographer:PA3 # For Cartographer V3
#cs_pin: cartographer:PA0 # For Cartographer V4
#spi_bus: spi1

#[resonance_tester]
#accel_chip: adxl345
#probe_points:
    #150, 150, 20 # Fill out the blank with x and y coordinates where you want to 


